replicaCount: 1

image:
  repository: ghcr.io/jorgemoralespou/educates-gitlab-operator
  tag: latest
  pullPolicy: IfNotPresent

namespace:
  create: false
  name: gitlab-operator-system

serviceAccount:
  create: true
  name: educates-gitlab-operator

rbac:
  create: true
  clusterRoleName: educates-gitlab-operator
  clusterRoleBindingName: educates-gitlab-operator

gitlab:
  # Operator-level TLS/CA defaults applied to all GitLabInstances.
  # Instance CR fields override these when set.
  tlsSecretName: ""
  caSecretName: ""
  caSecretKey: ""
  insecureSkipTlsVerify: false

podLabels: {}
podAnnotations: {}
resources: {}
extraEnv: []
