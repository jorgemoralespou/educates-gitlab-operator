replicaCount: 1

image:
  repository: ghcr.io/jorgemoralespou/educates-gitlab-operator
  tag: latest
  pullPolicy: IfNotPresent

namespace:
  create: false
  name: educates-gitlab-operator

serviceAccount:
  create: true
  name: educates-gitlab-operator

rbac:
  create: true
  clusterRoleName: educates-gitlab-operator
  clusterRoleBindingName: educates-gitlab-operator

gitlab:
  # Operator-level cert-manager defaults applied to all GitLabInstances.
  # Instance CR spec.certManagerIssuerRef overrides this when set.
  certManagerIssuerName: "educateswildcard"
  insecureSkipTlsVerify: false

podLabels: {}
podAnnotations: {}
resources: {}
extraEnv: []
