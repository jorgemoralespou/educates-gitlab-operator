name: Publish Workshop

on:
  push:
    tags:
      - "[0-9]+.[0-9]+"

jobs:
  publish-workshop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Create release
        uses: educates/educates-github-actions/publish-workshop@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: ./lab-gitlab-operator